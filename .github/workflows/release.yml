name: release

# Build cross-platform binaries and attach them to a GitHub Release when a v* tag is pushed.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target-name: windows-x64
            bin: ferra-vrm.exe
            archive: ferra-vrm-windows-x64.zip
          - os: macos-latest
            target-name: macos-arm64
            bin: ferra-vrm
            archive: ferra-vrm-macos-arm64.tar.gz
          - os: ubuntu-latest
            target-name: linux-x64
            bin: ferra-vrm
            archive: ferra-vrm-linux-x64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      # The candle + bevy release build is disk- and memory-heavy; the default ubuntu runner
      # OOM-kills the link step (~7 min in) and can run out of disk. Reclaim preinstalled SDKs
      # we don't use and add swap so the build has headroom.
      - name: Free disk space + add swap (Linux)
        if: runner.os == 'Linux'
        run: |
          # Best-effort (|| true): never let cleanup fail the build. fallocate is unreliable on the
          # runner's overlay fs, so build the swapfile with dd.
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          sudo dd if=/dev/zero of=/swapfile bs=1M count=10240 status=none || true
          sudo chmod 600 /swapfile || true
          sudo mkswap /swapfile || true
          sudo swapon /swapfile || true
          df -h / ; free -h || true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/ferra-vrm
          cp target/release/${{ matrix.bin }} dist/ferra-vrm/
          [ -d assets ] && cp -r assets dist/ferra-vrm/ || true
          cp README.md LICENSE-MIT LICENSE-APACHE dist/ferra-vrm/
          tar -C dist -czf ${{ matrix.archive }} ferra-vrm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/ferra-vrm | Out-Null
          Copy-Item target/release/${{ matrix.bin }} dist/ferra-vrm/
          if (Test-Path assets) { Copy-Item -Recurse assets dist/ferra-vrm/ }
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE dist/ferra-vrm/
          Compress-Archive -Path dist/ferra-vrm/* -DestinationPath ${{ matrix.archive }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
